# Self-hosted Supabase for NewsBox
# 基于官方 supabase/docker/docker-compose.yml 裁剪
# 关闭：realtime（项目未使用）、vector + analytics（日志聚合，可选）
# 启用：db + auth + rest + storage + meta + kong + studio + edge-runtime + imgproxy
#
# Usage:
#   cp .env.example .env  # 修改密钥
#   docker compose up -d
#   docker compose ps

name: supabase-newsbox

services:
  # -----------------------------------------------------------
  # API Gateway —— 对外唯一入口（443 -> 8000）
  # -----------------------------------------------------------
  kong:
    image: kong:2.8.1
    container_name: supabase-newsbox-kong
    restart: unless-stopped
    depends_on:
      auth: { condition: service_healthy }
      rest: { condition: service_started }
      storage: { condition: service_started }
      meta: { condition: service_started }
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    volumes:
      - ./volumes/kong/kong.yml:/var/lib/kong/kong.yml:ro
    ports:
      - "${KONG_HTTP_PORT:-18000}:8000/tcp"
      - "${KONG_HTTPS_PORT:-18443}:8443/tcp"

  # -----------------------------------------------------------
  # Studio —— 管理后台 UI
  # -----------------------------------------------------------
  studio:
    image: supabase/studio:20250505-7ed4ee4
    container_name: supabase-newsbox-studio
    restart: unless-stopped
    depends_on:
      meta: { condition: service_started }
      analytics: { condition: service_started }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://studio:3000/api/profile').then(r=>{if(r.status!==200)throw 1})"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-NewsBox}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-NewsBox}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-disabled}
      LOGFLARE_URL: http://analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: "false"

  # -----------------------------------------------------------
  # Auth (GoTrue)
  # -----------------------------------------------------------
  auth:
    image: supabase/gotrue:v2.158.1
    container_name: supabase-newsbox-auth
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 3
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres

      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: ${GOTRUE_DISABLE_SIGNUP:-false}
      GOTRUE_PASSWORD_MIN_LENGTH: ${GOTRUE_PASSWORD_MIN_LENGTH:-6}

      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}

      # Email/password
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-false}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-NewsBox}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE:-/auth/v1/verify}

      # OAuth - Google
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOTRUE_EXTERNAL_GOOGLE_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOTRUE_EXTERNAL_GOOGLE_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${API_EXTERNAL_URL}/auth/v1/callback

      # OAuth - GitHub
      GOTRUE_EXTERNAL_GITHUB_ENABLED: ${GOTRUE_EXTERNAL_GITHUB_ENABLED:-false}
      GOTRUE_EXTERNAL_GITHUB_CLIENT_ID: ${GOTRUE_EXTERNAL_GITHUB_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GITHUB_SECRET: ${GOTRUE_EXTERNAL_GITHUB_SECRET:-}
      GOTRUE_EXTERNAL_GITHUB_REDIRECT_URI: ${API_EXTERNAL_URL}/auth/v1/callback

  # -----------------------------------------------------------
  # PostgREST —— 数据库 REST API
  # -----------------------------------------------------------
  rest:
    image: postgrest/postgrest:v12.2.0
    container_name: supabase-newsbox-rest
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    command: "postgrest"

  # -----------------------------------------------------------
  # Storage
  # -----------------------------------------------------------
  storage:
    image: supabase/storage-api:v1.11.13
    container_name: supabase-newsbox-storage
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
      rest: { condition: service_started }
      imgproxy: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/status"]
      interval: 5s
      timeout: 5s
      retries: 3
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 524288000   # 500MB（视频上传需要大一些）
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - ./volumes/storage:/var/lib/storage:z

  # -----------------------------------------------------------
  # imgproxy —— 图片处理
  # -----------------------------------------------------------
  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    container_name: supabase-newsbox-imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION:-true}
    volumes:
      - ./volumes/storage:/var/lib/storage:z

  # -----------------------------------------------------------
  # Postgres Meta —— Studio 后台用的 schema 检查器
  # -----------------------------------------------------------
  meta:
    image: supabase/postgres-meta:v0.84.2
    container_name: supabase-newsbox-meta
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  # -----------------------------------------------------------
  # Edge Functions Runtime（Deno）—— 部署项目里的 2 个函数
  # -----------------------------------------------------------
  functions:
    image: supabase/edge-runtime:v1.58.4
    container_name: supabase-newsbox-edge-functions
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      VERIFY_JWT: "${FUNCTIONS_VERIFY_JWT:-false}"
    volumes:
      # 直接 mount 项目里的 supabase/functions 目录
      - ../../supabase/functions:/home/deno/functions:Z
    command: ["start", "--main-service", "/home/deno/functions/main"]

  # -----------------------------------------------------------
  # Postgres —— 核心数据库
  # -----------------------------------------------------------
  db:
    image: supabase/postgres:15.6.1.143
    container_name: supabase-newsbox-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      # 只在内网或跳板机暴露
      - "${POSTGRES_PORT:-127.0.0.1:15432}:5432"
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: postgres
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data:Z
      - ./volumes/db/init:/docker-entrypoint-initdb.d:ro,Z
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal

  # -----------------------------------------------------------
  # Analytics（Logflare）—— 可选，关闭可注释整段
  # -----------------------------------------------------------
  analytics:
    image: supabase/logflare:1.4.0
    container_name: supabase-newsbox-analytics
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      LOGFLARE_NODE_HOST: 127.0.0.1
      DB_USERNAME: supabase_admin
      DB_DATABASE: _supabase
      DB_HOSTNAME: db
      DB_PORT: 5432
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: _analytics
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-changeme-32chars-aaaaaaaaaaaaaaa}
      LOGFLARE_SINGLE_TENANT: "true"
      LOGFLARE_SUPABASE_MODE: "true"
      LOGFLARE_MIN_CLUSTER_SIZE: 1
      POSTGRES_BACKEND_URL: postgresql://supabase_admin:${POSTGRES_PASSWORD}@db:5432/_supabase
      POSTGRES_BACKEND_SCHEMA: _analytics
      LOGFLARE_FEATURE_FLAG_OVERRIDE: multibackend=true

# ===============================================================
# 项目未使用的服务（注释保留，需要时取消注释）：
#
# realtime:      实时订阅 —— 项目无 supabase.channel() 调用
# vector:        日志收集 —— 仅 analytics 依赖
# supavisor:     连接池 —— 单机部署 + 应用连接数低，暂不需要
# ===============================================================
